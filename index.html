<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Roboto', arial, sans-serif;
            background-color: #ffffff; /* Clean white background, no OS elements */
            display: flex; align-items: center; justify-content: center;
        }

        /* The isolated login card - matching the wide 2-column layout in your PNG */
        .login-container {
            width: 740px; 
            padding: 48px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 24px;
        }

        .brand-section { padding-right: 10px; }
        
        .google-logo { width: 48px; margin-bottom: 12px; }
        
        h1 { 
            font-family: 'Google Sans', sans-serif; 
            font-size: 36px; 
            font-weight: 400; 
            color: #1f1f1f; 
            margin: 0; 
            line-height: 1.2;
        }

        .subtext { 
            font-size: 16px; 
            color: #1f1f1f; 
            margin-top: 10px; 
            font-weight: 400;
        }

        .input-section { padding-top: 40px; }

        input[type="text"] {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #747775;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            outline-color: #0b57d0;
        }

        .link-text { 
            color: #0b57d0; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500; 
            display: inline-block;
            margin-top: 9px;
        }

        .privacy-notice { 
            font-size: 14px; 
            color: #444746; 
            line-height: 1.5; 
            margin: 40px 0 50px 0; 
        }

        .button-row { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 24px; 
        }

        .btn-next { 
            background: #0b57d0; 
            color: white; 
            padding: 10px 24px; 
            border-radius: 20px; 
            border: none; 
            font-family: 'Google Sans', sans-serif;
            font-weight: 500; 
            font-size: 14px;
            cursor: pointer; 
        }
        
        .btn-create {
            color: #0b57d0;
            background: none;
            border: none;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Left Side: Branding -->
    <div class="brand-section">
        <svg class="google-logo" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <h1>Sign in</h1>
        <div class="subtext">Use your Google Account</div>
    </div>

    <!-- Right Side: Interaction -->
    <div class="input-section">
        <input type="text" placeholder="Email or phone" spellcheck="false">
        <br>
        <a href="#" class="link-text">Forgot email?</a>
        
        <div class="privacy-notice">
            Not your computer? Use Guest mode to sign in privately. <span class="link-text" style="margin:0">Learn more</span>
        </div>

        <div class="button-row">
            <button class="btn-create">Create account</button>
            <button class="btn-next">Next</button>
        </div>
    </div>
</div>

</body>
</html>
