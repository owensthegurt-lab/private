<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --text-dark: #202124;
            --border-gray: #dadce0;
        }

        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #f0f2f5; /* Light gray background like the screenshot */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* The Main Container from Screenshot 2026-05-13 10.10.13 AM.png */
        .auth-card {
            background: white;
            width: 740px; /* Wider desktop footprint */
            min-height: 400px;
            border-radius: 28px; /* Softer, modern corners */
            display: flex;
            padding: 36px;
            box-shadow: none;
            box-sizing: border-box;
        }

        /* Left Column: Branding */
        .brand-section {
            flex: 1;
            padding-right: 20px;
        }

        .google-logo { width: 75px; margin-bottom: 12px; }
        h1 { font-size: 36px; font-weight: 400; color: var(--text-dark); margin: 10px 0; }
        .sub-text { font-size: 16px; color: var(--text-dark); margin-bottom: 24px; }

        /* Right Column: Interaction */
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .forgot-link {
            color: var(--google-blue);
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
            display: block;
            margin-top: 8px;
        }

        .helper-text {
            font-size: 14px;
            color: #5f6368;
            margin: 32px 0;
            line-height: 1.4;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: auto;
        }

        .create-link {
            color: var(--google-blue);
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-next {
            background-color: var(--google-blue);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 20px; /* Pill shape from the screenshot */
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-section">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="google-logo">
        <h1>Sign in</h1>
        <p class="sub-text">Use your Google Account</p>
    </div>

    <div class="form-section">
        <div id="step-container">
            <input type="email" id="user-input" placeholder="Email or phone">
            <a href="#" class="forgot-link">Forgot email?</a>
            
            <p class="helper-text">
                Not your computer? Use Guest mode to sign in privately. 
                <a href="#" style="color: var(--google-blue); text-decoration: none; font-weight:500;">Learn more</a>
            </p>

            <div class="actions">
                <a href="#" class="create-link">Create account</a>
                <button class="btn-next" onclick="capture()">Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    function capture() {
        const val = document.getElementById('user-input').value;
        // As per LAB_EXERCISES_81.txt: Capture and cycle[cite: 1]
        console.log("Captured Entry:", val);
        alert("Educational Simulation: Data logged to console.");
    }
</script>

</body>
</html>
